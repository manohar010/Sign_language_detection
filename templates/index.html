<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Real-Time Sign Language Reader</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.card {
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.display-area {
    height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
    border-radius: 10px;
    overflow: hidden;
}

.dashboard-box {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    text-align: center;
}
</style>
</head>

<body>

<div class="header">
🤟 A Real-Time Sign Language Reader
</div>

<div class="container">
<div class="row">

<div class="col-md-4">
<div class="card p-3">

<h5>Controls</h5>
<hr>

<form action="/predict" method="post" enctype="multipart/form-data">
<input class="form-control mb-2" type="file" name="file" required>
<button class="btn btn-primary w-100 mb-2">Upload & Detect</button>
</form>

<button onclick="startLive()" class="btn btn-danger w-100 mb-2">Start Camera</button>
<button onclick="stopLive()" class="btn btn-secondary w-100 mb-2">Stop Camera</button>
<button onclick="clearWord()" class="btn btn-warning w-100">Clear Word</button>

</div>

<div class="dashboard-box">
<h4>📊 Live Data</h4>
<p>Letter: <span id="letter">{{ pred_letter | default('-') }}</span></p>
<p>Word: <span id="word">{{ pred_word | default('-') }}</span></p>
<p>Confidence: <span id="conf">{{ pred_conf | default('-') }}</span></p>
</div>

</div>

<div class="col-md-8">
<div class="card p-3">

<h5>Detection Output</h5>

<div class="display-area" id="displayBox">
{% if image_path %}
<img src="{{ image_path }}" style="max-width: 100%; max-height: 100%;">
{% else %}
<p>Start camera or upload image</p>
{% endif %}
</div>

</div>
</div>

</div>
</div>

<script>

let interval = null;

function startLive() {
    document.getElementById('displayBox').innerHTML =
        '<img src="/video_feed" style="max-width: 100%; max-height: 100%;">';

    if (!interval) {
        interval = setInterval(updateData, 1000);
    }
}

function stopLive() {
    fetch('/stop_camera')
    .then(() => {
        document.getElementById('displayBox').innerHTML =
            "<p>Camera Stopped</p>";

        clearInterval(interval);
        interval = null;

        document.getElementById("letter").innerText = "-";
        document.getElementById("conf").innerText = "-";
    });
}

function clearWord() {
    fetch('/clear_word')
    .then(() => {
        document.getElementById("word").innerText = "-";
    });
}

function updateData() {
    fetch('/get_word')
    .then(res => res.json())
    .then(data => {
        document.getElementById("word").innerText = data.word;
    });

    fetch('/get_stats')
    .then(res => res.json())
    .then(data => {
        document.getElementById("letter").innerText = data.letter;
        document.getElementById("conf").innerText = data.confidence;
    });
}

</script>

</body>
</html>
